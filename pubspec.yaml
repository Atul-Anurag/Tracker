name: travel_tracker
description: Travel Expense & Geo-Tracker App for India with GPS-triggered expense tracking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Database
  sqflite: ^2.3.0
  path: ^1.8.0
  
  # Location
  geolocator: ^9.0.0
  geocoding: ^2.1.0
  
  # Background services
  workmanager: ^0.5.1
  wakelock: ^0.6.0
  
  # UI
  google_maps_flutter: ^2.5.0
  intl: ^0.19.0
  provider: ^6.0.0
  
  # Permissions
  permission_handler: ^11.4.4
  
  # Networking
  http: ^1.1.0
  
  # State management
  get: ^4.6.5
  
  # Device info
  device_info_plus: ^9.1.1
  
  # SMS parsing
  regex: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/icons/
    - assets/maps/
